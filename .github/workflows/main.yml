# This workflow automates the Marketing ETL pipeline on a weekly schedule.
# It ensures that search trends and simulated ad data are always up to date
# without manual intervention.

name: Marketing Data Auto-Update Pipeline

on:
  # Automated trigger: Runs every Monday at 00:00 UTC
  schedule:
    - cron: '0 0 * * 1'

  # Manual trigger: Runs immediately whenever code is pushed to the main branch
  push:
    branches: [ master ]

jobs:
  build_and_run:
    # We use the latest Ubuntu runner provided by GitHub Actions (Cloud Environment)
    runs-on: ubuntu-latest

    steps:
      # --- 1. Environment Setup ---
      # Pulls the latest version of the repository into the runner's workspace
      - name: Checkout repository
        uses: actions/checkout@v3

      # Sets up a specific Python version to ensure environment consistency
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # --- 2. Dependency Management ---
      # Installs all required analytical libraries (Pandas, Pytrends, etc.)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- 3. Execution ---
      - name: Execute ETL Pipeline
        run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Itt adjuk át a kulcsot!

      #Run it to refresh charts
      - name: Refresh Visual Reports
        run: python src/visualizer.py

      # --- 4. Data Persistence ---
      - name: Commit and Push updated data
        run: |
          git config --global user.name 'Mate Hermann'
          git config --global user.email 'mate3829@gmail.com'
          
          git stash
          git pull origin master --rebase
          git stash pop || echo "No changes to pop"
          
          git add -f marketing_data.db data/processed/*.csv weekly_report.txt docs/performance_report.png
          
          git commit -m "Automated Data Refresh: $(date +'%Y-%m-%d')" || echo "No changes detected."
          git push origin master